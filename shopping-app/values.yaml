# Shopping App - Default Values for Helm Chart
# This YAML file contains all configurable parameters

# Global namespace
namespace: fullstack

# ================================================
# BACKEND Configuration
# ================================================
backend:
  replicaCount: 3
  image:
    repository: pawanjadon
    name: k8s-backend
    tag: latest
  port: 5000
  serviceType: ClusterIP
  config:
    DB_HOST: mysql-service
    DB_PORT: "3306"
    DB_NAME: appdb
    DB_USER: appuser
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  probes:
    readinessProbe:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 5
    livenessProbe:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 15

# ================================================
# FRONTEND Configuration
# ================================================
frontend:
  replicaCount: 2
  image:
    repository: pawanjadon
    name: k8s-frontend
    tag: latest
  port: 80
  serviceType: LoadBalancer
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  probes:
    readinessProbe:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 5

# ================================================
# MySQL Configuration
# ================================================
mysql:
  image: mysql
  tag: "8.0"
  port: 3306
  serviceType: ClusterIP
  
  # Credentials (stored in Secret)
  rootPassword: rootpassword123
  database: appdb
  user: appuser
  userPassword: apppassword123
  
  # Storage
  storage: 5Gi
  hostPath: /mnt/data/mysql
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  probes:
    readinessProbe:
      initialDelaySeconds: 20
      periodSeconds: 10
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 20
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
