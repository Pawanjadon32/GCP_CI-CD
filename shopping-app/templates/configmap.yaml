
# ─────────────────────────────────────────
# 3. ConfigMap — Frontend nginx config
#    /api/* requests ko backend service pe forward karta hai
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: {{ .Values.namespace }}
data:
  nginx.conf: |
    server {
        listen 80;

        # Static frontend files serve karo
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # /api/* requests backend-service ko forward karo
        location /api/ {
            proxy_pass http://backend-service:{{ .Values.backend.port }}/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

---
# ─────────────────────────────────────────
# 4. ConfigMap — Backend env variables
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ .Values.namespace }}
data:
  DB_HOST: "{{ .Values.backend.config.DB_HOST }}"
  DB_PORT: "{{ .Values.backend.config.DB_PORT }}"
  DB_NAME: "{{ .Values.backend.config.DB_NAME }}"
  DB_USER: "{{ .Values.backend.config.DB_USER }}"

---

