apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
  namespace: fullstack
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/mysql   # single-node cluster ke liye; production mein StorageClass use karo

---